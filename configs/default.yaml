app:
  output_dir: outputs
  log_level: INFO

org_sources:
  mode: emacs
  emacs_init_paths:
    - "~/.emacs"
    - "~/.emacs.d/init.el"
    - "~/.emacs.d/lisp/init-org.el"
  emacs_agenda_var: org-agenda-files
  explicit_files: []

reports:
  filters:
    include_tags: []
    exclude_tags: []
    tag_match_mode: any
    include_task_regex: []
    exclude_task_regex: []
  plots:
    top_k_tasks: 25
    top_k_tags: 25
    # If null, timeseries spans the full data range.
    timeseries_last_n_days: null
    timeseries_rolling_days: 7

time_buckets:
  other_bucket: other
  bucket_order:
    - pride
    - alfa_laval
    - tooling
    - ml_tooling_tutorial
    - aim_flix
    - msc
    - hh
    - holidays_vacations
    - other

  tag_to_bucket:
    pride: pride
    alfa_laval: alfa_laval
    tooling: tooling
    ml_tooling_tutorial: ml_tooling_tutorial
    aim_flix: aim_flix
    msc: msc
    hh: hh
    ite: hh
    isdd: hh
    holidays: holidays_vacations
    vacations: holidays_vacations

  resolution:
    default_strategy: priority
    priority_order:
      - pride
      - alfa_laval
      - tooling
      - ml_tooling_tutorial
      - aim_flix
      - msc
      - hh
      - holidays_vacations
      - other

    # Used only for split_weighted. Leaving this empty means equal split.
    weights: {}

    # First matching rule wins.
    rules: []
